<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ESP32 DHT11 Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f0f0; text-align: center; }
    h1 { color: #333; }
    #charts { display: flex; justify-content: space-around; flex-wrap: wrap; margin-top: 30px; }
    canvas { background: #fff; border-radius: 8px; padding: 20px; margin: 20px; max-width: 500px; }
    .value { font-size: 2em; margin: 10px 0; }
  </style>
</head>
<body>

  <h1>ESP32 DHT11 Live Dashboard</h1>

  <div>
    <div>Temperature: <span id="tempValue">--</span> °C</div>
    <div>Humidity: <span id="humValue">--</span> %</div>
  </div>

  <div id="charts">
    <canvas id="tempChart"></canvas>
    <canvas id="humChart"></canvas>
  </div>

  <script>
    // Your Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBqH95nsWmoZV7xGNHQdqE9JiLIvvzX1Zc",
      authDomain: "esp32timperature.firebaseapp.com",
      databaseURL: "https://esp32timperature-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "esp32timperature",
      storageBucket: "esp32timperature.firebasestorage.app",
      messagingSenderId: "220730705611",
      appId: "1:220730705611:web:8f74f1244c6fb511ce3d4e",
      measurementId: "G-BY0MTVMS34"
    };

    // Initialize Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // HTML elements
    const tempValue = document.getElementById("tempValue");
    const humValue = document.getElementById("humValue");

    // Chart setup
    const tempCtx = document.getElementById('tempChart').getContext('2d');
    const humCtx = document.getElementById('humChart').getContext('2d');

    const tempChart = new Chart(tempCtx, {
      type: 'line',
      data: { labels: [], datasets: [{ label: 'Temperature °C', data: [], borderColor: 'red', fill: false }] },
      options: { responsive: true, scales: { x: { display: true }, y: { min: 0, max: 50 } } }
    });

    const humChart = new Chart(humCtx, {
      type: 'line',
      data: { labels: [], datasets: [{ label: 'Humidity %', data: [], borderColor: 'blue', fill: false }] },
      options: { responsive: true, scales: { x: { display: true }, y: { min: 0, max: 100 } } }
    });

    // Function to update charts
    function updateCharts(time, temp, hum) {
      tempChart.data.labels.push(time);
      tempChart.data.datasets[0].data.push(temp);
      if (tempChart.data.labels.length > 20) { // keep last 20 points
        tempChart.data.labels.shift();
        tempChart.data.datasets[0].data.shift();
      }
      tempChart.update();

      humChart.data.labels.push(time);
      humChart.data.datasets[0].data.push(hum);
      if (humChart.data.labels.length > 20) {
        humChart.data.labels.shift();
        humChart.data.datasets[0].data.shift();
      }
      humChart.update();
    }

    // Listen for Firebase changes
    const sensorRef = database.ref('/sensor');
    sensorRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        const temp = data.temperature;
        const hum = data.humidity;
        const now = new Date().toLocaleTimeString();

        tempValue.innerText = temp.toFixed(1);
        humValue.innerText = hum.toFixed(1);

        updateCharts(now, temp, hum);
      }
    });
  </script>

</body>
</html>
