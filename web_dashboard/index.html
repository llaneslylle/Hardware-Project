<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ESP32 Temperature Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
}

h1{
color:#333;
}

.card{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
display:inline-block;
}

.value{
font-size:40px;
font-weight:bold;
}

canvas{
background:white;
padding:20px;
border-radius:10px;
margin-top:20px;
}
</style>
</head>

<body>

<h1>ESP32 Temperature & Humidity Dashboard</h1>

<div class="card">
Temperature
<div class="value" id="temp">-- °C</div>
</div>

<div class="card">
Humidity
<div class="value" id="hum">-- %</div>
</div>

<br>

<canvas id="tempChart" width="600" height="250"></canvas>
<canvas id="humChart" width="600" height="250"></canvas>


<script type="module">

// Import Firebase SDK
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

// Firebase configuration
const firebaseConfig = {
apiKey: "AIzaSyBqH95nsWmoZV7xGNHQdqE9JiLIvvzX1Zc",
authDomain: "esp32timperature.firebaseapp.com",
databaseURL: "https://esp32timperature-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "esp32timperature",
storageBucket: "esp32timperature.firebasestorage.app",
messagingSenderId: "220730705611",
appId: "1:220730705611:web:8f74f1244c6fb511ce3d4e",
measurementId: "G-BY0MTVMS34"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// HTML elements
const tempEl = document.getElementById("temp");
const humEl = document.getElementById("hum");

// Charts
const tempChart = new Chart(document.getElementById("tempChart"), {
type: "line",
data: {
labels: [],
datasets: [{
label: "Temperature (°C)",
data: [],
borderColor: "red",
fill:false
}]
},
options:{
responsive:true
}
});

const humChart = new Chart(document.getElementById("humChart"), {
type: "line",
data: {
labels: [],
datasets: [{
label: "Humidity (%)",
data: [],
borderColor: "blue",
fill:false
}]
},
options:{
responsive:true
}
});

// Listen to Firebase data
const sensorRef = ref(db,"sensor");

onValue(sensorRef,(snapshot)=>{

const data = snapshot.val();

if(data){

const temp = data.temperature;
const hum = data.humidity;

tempEl.innerText = temp + " °C";
humEl.innerText = hum + " %";

const time = new Date().toLocaleTimeString();

// Update charts
tempChart.data.labels.push(time);
tempChart.data.datasets[0].data.push(temp);

humChart.data.labels.push(time);
humChart.data.datasets[0].data.push(hum);

// keep last 20 points
if(tempChart.data.labels.length > 20){
tempChart.data.labels.shift();
tempChart.data.datasets[0].data.shift();
}

if(humChart.data.labels.length > 20){
humChart.data.labels.shift();
humChart.data.datasets[0].data.shift();
}

tempChart.update();
humChart.update();

}

});

</script>

</body>
</html>
